services:
  cleanup:
    image: postgres:18-alpine
    entrypoint: [ "sh", "/cleanup.sh" ]
    # entrypoint: [ "sleep", "1000" ]
    volumes:
      - ./cleanup.sh:/cleanup.sh:ro,z
      - photos_data:${DATA_DIR}:z
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - funsplash
    restart: unless-stopped
    mem_limit: 8m
    cpus: 0.05

  funsplash:
    build:
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - photos_data:${DATA_DIR}:z
    ports:
      - "1337:1337"
    env_file:
      - .env
    environment:
      - TMPDIR=${DATA_DIR}/tmp
    networks:
      - funsplash
    restart: unless-stopped
    mem_limit: 2g
    cpus: 3

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    # ports:
    #   - "5432:5432"
    env_file:
      - .env
    networks:
      - funsplash
    mem_limit: 1.5g
    cpus: 0.5
    volumes:
      - postgres_data:/var/lib/postgresql:z
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:z
    command: [ "postgres", "-c", "max_connections=200" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${PGUSER} -d $${PGDATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  funsplash:
    driver: bridge

volumes:
  postgres_data:
  photos_data:
