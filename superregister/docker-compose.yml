services:
  superregister_server:
    build: .
    # Mount the data folder writable, so that information can be persisted across restarts.
    volumes:
      - ./data/:/data:rw
    # Define the port mapping (external:internal port)
    ports:
      - "6767:6767"
    environment:
      - TRAVERSAL_HASH=a16e427ba157c36408c47bce66ec83a37c4fdf8802ff6c242b06b0e7ccdb7646
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1
